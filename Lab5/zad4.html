    <!DOCTYPE html>
<html>
<head>
    <title>fibonaci</title>
</head>
<body>
<script>
function fibonacci(n) {
    let sequence = [0, 1];

    if (n <= 0) return [];
    if (n == 1) return [0];

    for (let i = 2; i < n; i++){
        let nextNum = sequence[i-1] + sequence[i-2];
        sequence.push(nextNum);
    }

    return sequence

}

let n = parseFloat(prompt('Podaj rozmiar ciągu Fibonacciego: '));
console.log(fibonacci(n));
document.write('Ciąg Fibonacciego o długości ' + n + ' został wypisany w konsoli (F12)');
</script>
</body>
</html>
